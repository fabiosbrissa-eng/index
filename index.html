<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>LENORMAND AI</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --input-bg: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --error: #ff4d4d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 15px 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: var(--gold);
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            font-weight: 300;
        }
        .sub {
            color: #666;
            font-size: 0.7rem;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .main-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .section-label {
            color: #8a7020;
            font-size: 0.75rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            display: block;
        }
        input, textarea, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
        }
        input:focus, textarea:focus { border-color: var(--gold); }
        textarea { height: 80px; resize: none; margin-top: 5px; }
        input::placeholder { color: #444; }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 15px;
            align-items: start;
        }
        .gender-select {
            display: flex;
            background: var(--input-bg);
            border-radius: 10px;
            padding: 2px;
            border: 1px solid var(--border);
            height: 52px;
        }
        .gender-opt {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .gender-opt.active {
            background: var(--gold);
            color: #000;
            font-weight: 700;
        }
        .qty-select {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--input-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .qty-btn {
            flex: 1;
            min-width: 80px;
            background: #222;
            border: 1px solid #333;
            color: #666;
            padding: 12px 5px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.2s;
            text-align: center;
        }
        .qty-btn:hover { border-color: var(--gold); color: var(--text); }
        .qty-btn.selected {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .action-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        button.action-btn {
            background: #111;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            border-radius: 10px;
            transition: 0.3s;
            flex: 1;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        button.action-btn:hover:not(:disabled) {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        button.action-btn:disabled {
            border-color: #333;
            color: #444;
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.btn-clear {
            border-color: #551111;
            color: #ff4d4d;
            max-width: 60px;
            flex: none;
        }
        button.btn-clear:hover { background: #551111; color: #fff; }
        
        .grid-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            margin: 30px auto 0;
            perspective: 1000px;
            min-height: 100px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 350px;
        }
        .grid.mesa-real { grid-template-columns: repeat(6, 1fr); max-width: 100%; gap: 6px; }
        .grid.week-spread { grid-template-columns: repeat(4, 1fr); max-width: 400px; }
        .grid.month-spread { grid-template-columns: repeat(4, 1fr); max-width: 400px; }

        .card {
            width: 100%;
            aspect-ratio: 2.5/3.5;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.6s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .card.flipped {
            border-color: var(--gold);
            background: #1e1e1e;
            transform: translateY(-5px);
        }
        .card-inner { font-size: 2.4rem; line-height: 1; margin-bottom: 5px; }
        .card-name {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            opacity: 0;
            transition: opacity 0.4s;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .card.flipped .card-name { opacity: 1; }
        .card-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #222 10px, #222 20px);
            border-radius: 8px; z-index: 2;
        }
        .card.flipped .card-back { display: none; }

        .report {
            max-width: 600px;
            width: 100%;
            background: #111;
            border-left: 4px solid var(--gold);
            padding: 25px;
            margin-top: 30px;
            line-height: 1.8;
            white-space: pre-wrap;
            display: none;
            font-size: 1rem;
            color: #ccc;
            border-radius: 0 12px 12px 0;
        }
        .loading {
            color: var(--gold);
            display: none;
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }
        .loading span { animation: blink 1.4s infinite both; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <h1>Lenormand AI</h1>
    <div class="sub">Oráculo Digital</div>

    <div class="main-container" id="input-section">
        <div>
            <label class="section-label">Consultante</label>
            <input type="text" id="consulente-nome" placeholder="Nome completo">
        </div>
        <div class="info-grid">
            <div>
                <label class="section-label">Data de Nascimento</label>
                <input type="date" id="consulente-nasc">
            </div>
            <div>
                <label class="section-label">Gênero</label>
                <div class="gender-select">
                    <button class="gender-opt active" onclick="setGender('Homem')">Masc</button>
                    <button class="gender-opt" onclick="setGender('Mulher')">Fem</button>
                    <button class="gender-opt" onclick="setGender('Outro')">Outro</button>
                </div>
            </div>
        </div>
        <div>
            <label class="section-label">Tipo de Tiragem</label>
            <div class="qty-select">
                <button class="qty-btn selected" onclick="selectQty(1, this)">1 Carta</button>
                <button class="qty-btn" onclick="selectQty(3, this)">3 Cartas</button>
                <button class="qty-btn" onclick="selectQty(7, this)">Sua Semana</button>
                <button class="qty-btn" onclick="selectQty(12, this)">Seu Mês</button>
                <button class="qty-btn" onclick="selectQty(36, this)">Mesa Real</button>
            </div>
        </div>
        <div>
            <label class="section-label">Pergunta (Opcional)</label>
            <textarea id="question" placeholder="Digite sua pergunta..."></textarea>
        </div>
        <div class="action-group">
            <button class="action-btn" id="btn-deal" onclick="startReading()">🔮 Embaralhar & Abrir</button>
            <button class="action-btn" id="btn-read" onclick="read()" disabled style="display:none;">✨ Interpretar</button>
            <button class="action-btn btn-clear" id="btn-close" onclick="resetGame()" disabled>✖</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid" id="table"></div>
    </div>

    <div id="loading" class="loading">Consultando as Cartas<span>.</span><span>.</span><span>.</span></div>
    <div id="report" class="report"></div>

    <script>
        // --- CONFIGURAÇÃO ---
        const _k = "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";
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        const MODEL = "llama-3.1-8b-instant";

        // --- ESTADO ---
        const deck = [
            { n:1, name: "Cavaleiro", i: "🏇" }, { n:2, name: "Trevo", i: "☘️" }, { n:3, name: "Navio", i: "⛵" },
            { n:4, name: "Casa", i: "🏠" }, { n:5, name: "Árvore", i: "🌳" }, { n:6, name: "Nuvens", i: "☁️" },
            { n:7, name: "Cobra", i: "🐍" }, { n:8, name: "Caixão", i: "⚰️" }, { n:9, name: "Buquê", i: "💐" },
            { n:10, name: "Foice", i: "🌾" }, { n:11, name: "Chicote", i: "🎢" }, { n:12, name: "Pássaros", i: "🐦" },
            { n:13, name: "Criança", i: "👶" }, { n:14, name: "Raposa", i: "🦊" }, { n:15, name: "Urso", i: "🐻" },
            { n:16, name: "Estrelas", i: "🌟" }, { n:17, name: "Cegonha", i: "🦢" }, { n:18, name: "Cão", i: "🐕" },
            { n:19, name: "Torre", i: "🏰" }, { n:20, name: "Jardim", i: "🌳" }, { n:21, name: "Montanha", i: "⛰️" },
            { n:22, name: "Caminho", i: "🛤️" }, { n:23, name: "Ratos", i: "🐀" }, { n:24, name: "Coração", i: "❤️" },
            { n:25, name: "Anel", i: "💍" }, { n:26, name: "Livro", i: "📖" }, { n:27, name: "Carta", i: "✉️" },
            { n:28, name: "Homem", i: "👨" }, { n:29, name: "Mulher", i: "👩" }, { n:30, name: "Lírios", i: "⚜️" },
            { n:31, name: "Sol", i: "☀️" }, { n:32, name: "Lua", i: "🌙" }, { n:33, name: "Chave", i: "🗝️" },
            { n:34, name: "Peixes", i: "🐟" }, { n:35, name: "Âncora", i: "⚓" }, { n:36, name: "Cruz", i: "✝️" }
        ];

        let state = {
            gender: 'Homem',
            targetQty: 1,
            currentCards: [],
            spreadType: 'geral' // geral, semana, mes, mesa
        };
        let consulenteData = { nome: '', nasc: '' };

        // --- LÓGICA ---
        function setGender(g) {
            state.gender = g;
            document.querySelectorAll('.gender-opt').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === (g === 'Homem' ? 'Masc' : g === 'Mulher' ? 'Fem' : 'Outro'));
            });
        }

        function selectQty(qty, btn) {
            state.targetQty = qty;
            document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            // Define o tipo de spread para o prompt
            if (qty === 7) state.spreadType = 'semana';
            else if (qty === 12) state.spreadType = 'mes';
            else state.spreadType = 'geral';
        }

        function resetGame() {
            const table = document.getElementById('table');
            table.innerHTML = '';
            table.className = 'grid';
            document.getElementById('report').style.display = 'none';
            document.getElementById('btn-read').disabled = true;
            document.getElementById('btn-read').style.display = 'none';
            document.getElementById('btn-close').disabled = true;
            
            const btnDeal = document.getElementById('btn-deal');
            btnDeal.disabled = false;
            btnDeal.textContent = "🔮 Embaralhar & Abrir";
            btnDeal.style.display = 'block';
            
            document.getElementById('consulente-nome').disabled = false;
            document.getElementById('consulente-nasc').disabled = false;
            document.getElementById('question').disabled = false;
            document.querySelectorAll('.qty-btn').forEach(b => b.disabled = false);
        }

        function startReading() {
            const nome = document.getElementById('consulente-nome').value.trim();
            const nasc = document.getElementById('consulente-nasc').value;
            
            if (!nome) {
                alert("Por favor, digite o nome do consulente.");
                return;
            }
            
            consulenteData.nome = nome;
            consulenteData.nasc = nasc || "não informada";
            
            document.getElementById('consulente-nome').disabled = true;
            document.getElementById('consulente-nasc').disabled = true;
            document.getElementById('question').disabled = true;
            document.querySelectorAll('.qty-btn').forEach(b => b.disabled = true);
            
            const btnDeal = document.getElementById('btn-deal');
            btnDeal.textContent = "🔮 Embaralhando...";
            btnDeal.disabled = true;
            
            const table = document.getElementById('table');
            table.innerHTML = '';
            state.currentCards = [];
            
            // Configura layout visual
            table.classList.remove('mesa-real', 'week-spread', 'month-spread');
            
            if (state.targetQty === 36) {
                table.classList.add('mesa-real');
                state.currentCards = [...deck].sort(() => Math.random() - 0.5);
            } else if (state.targetQty === 7) {
                table.classList.add('week-spread');
                state.currentCards = [...deck].sort(() => Math.random() - 0.5).slice(0, 7);
            } else if (state.targetQty === 12) {
                table.classList.add('month-spread');
                state.currentCards = [...deck].sort(() => Math.random() - 0.5).slice(0, 12);
            } else {
                state.currentCards = [...deck].sort(() => Math.random() - 0.5).slice(0, state.targetQty);
            }

            state.currentCards.forEach((c, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.innerHTML = `
                    <div class="card-back"></div>
                    <div class="card-content" style="opacity:0">
                        <div class="card-inner">${c.i}</div>
                        <div class="card-name">${c.n} ${c.name}</div>
                    </div>
                `;
                table.appendChild(cardEl);
                
                setTimeout(() => {
                    cardEl.classList.add('flipped');
                    cardEl.querySelector('.card-content').style.opacity = '1';
                }, 300 + (i * 100));
            });

            setTimeout(() => {
                btnDeal.style.display = 'none';
                document.getElementById('btn-read').style.display = 'block';
                document.getElementById('btn-read').disabled = false;
                document.getElementById('btn-close').disabled = false;
                document.getElementById('table').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, (state.currentCards.length * 100) + 800);
        }

        async function read() {
            const q = document.getElementById('question').value;
            const loading = document.getElementById('loading');
            const report = document.getElementById('report');
            
            loading.style.display = 'block';
            report.style.display = 'none';

            const cardList = state.currentCards.map(c => `${c.n}. ${c.name} (${c.i})`).join(', ');
            
            let systemPrompt = "Atue como um especialista sênior em Baralho Lenormand. Interprete as cartas de forma profunda, direta e precisa.";
            let userPrompt = `Consultante: ${consulenteData.nome}, Gênero: ${state.gender}, Nascimento: ${consulenteData.nasc}.`;
            
            if (state.spreadType === 'semana') {
                userPrompt += `\nTipo: Leitura para a Semana (7 cartas, uma para cada dia).`;
                userPrompt += `\nInstrução: Associe cada carta a um dia da semana (Segunda a Domingo) e dê uma previsão prática.`;
            } else if (state.spreadType === 'mes') {
                userPrompt += `\nTipo: Leitura para o Mês (12 cartas, uma para cada mês ou aspecto).`;
                userPrompt += `\nInstrução: Faça uma previsão abrangente para o próximo ciclo.`;
            } else {
                userPrompt += `\nPergunta: "${q || 'Leitura geral'}".`;
            }

            userPrompt += `\nCartas tiradas: ${cardList}.`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${_k}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 1500
                    })
                });

                if (!response.ok) throw new Error('Falha na conexão com o Oráculo');

                const data = await response.json();
                const text = data.choices[0].message.content;
                
                report.textContent = text;
                report.style.display = 'block';
                loading.style.display = 'none';

            } catch (err) {
                loading.style.display = 'none';
                alert("Erro: " + err.message);
            }
        }
    </script>
</body>
</html>
