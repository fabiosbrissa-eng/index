<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenormand AI - Leitura Digital</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #5c6bc0; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #3f51b5; }
        .result { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
        .card { background: #e3f2fd; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; color: #1565c0; font-size: 0.9rem; }
        .interpretation { background: #fff3e0; padding: 1rem; border-radius: 8px; color: #e65100; line-height: 1.6; }
        .loading { text-align: center; color: #666; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 Lenormand AI</h1>
    
    <div class="form-group">
        <label>Data de Nascimento</label>
        <input type="date" id="dataNasc" required>
    </div>

    <div class="form-group">
        <label>Tipo de Leitura</label>
        <select id="tipoLeitura">
            <option value="dia">Leitura do Dia (1 Carta)</option>
            <option value="semana">Leitura da Semana (3 Cartas)</option>
            <option value="mesa_real">Mesa Real (10 Cartas)</option>
            <option value="mes">Mesa do Mês (9 Cartas)</option>
        </select>
    </div>

    <button onclick="fazerLeitura()">Consultar as Cartas</button>

    <div class="loading" id="loading">Consultando a IA...</div>

    <div class="result" id="resultado" style="display: none;">
        <h3>Cartas Sorteadas:</h3>
        <div class="cards-grid" id="cardsArea"></div>
        
        <h3>Interpretação da IA:</h3>
        <div class="interpretation" id="textoIA"></div>
    </div>
</div>

<script>
    async function fazerLeitura() {
        const dataInput = document.getElementById('dataNasc').value;
        const tipo = document.getElementById('tipoLeitura').value;
        
        if (!dataInput) {
            alert("Por favor, selecione sua data de nascimento.");
            return;
        }

        const [ano, mes, dia] = dataInput.split('-');
        const payload = { dia_nasc: parseInt(dia), mes_nasc: parseInt(mes), ano_nasc: parseInt(ano), tipo: tipo };

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultado').style.display = 'none';

        try {
            const response = await fetch('http://127.0.0.1:8000/ler', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            // Renderiza Cartas
            const cardsArea = document.getElementById('cardsArea');
            cardsArea.innerHTML = data.cartas.map(c => `<div class="card">${c}</div>`).join('');
            
            // Renderiza Texto da IA
            document.getElementById('textoIA').innerText = data.interpretacao_ia;
            
            document.getElementById('resultado').style.display = 'block';
        } catch (error) {
            alert("Erro ao conectar com a API. Verifique se o servidor está rodando.");
            console.error(error);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>

</body>
</html>
